# AlphaCOGANT manuscript configuration.
# Links the prose to the execution layer: numeric {{TOKEN}}s come from
# scripts/z_generate_manuscript_variables.py -> src/alphacogant/manuscript_variables.py.

paper:
  title: "AlphaCOGANT: Recursive Corporate Self-Improvement as Active Inference"
  subtitle: "Rendering the AlphaFund Economic World Model as a GNN generative model via COGANT"
  version: "0.1.0"
  date: ""

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Atta Labs"
    corresponding: true
  - name: "Tucker Cahill Chambers"
    orcid: ""
    email: ""
    affiliation: "Atta Labs"
    corresponding: false

publication:
  github_repository: "docxology/alphacogant"
  journal: ""
  year: "2026"

keywords:
  - "active inference"
  - "expected free energy"
  - "recursive self-improvement"
  - "Generalized Notation Notation"
  - "economic world model"
  - "portfolio optimization"
  - "epistemic value"
  - "reproducible research"

metadata:
  license: "MIT"
  language: "en"
  # Tight typography (smaller margins + smaller font). geometry -> pandoc -V geometry;
  # fontsize below 10pt requires documentclass: extarticle (extsizes).
  geometry: "margin=1.4cm"
  documentclass: "extarticle"
  fontsize: "9pt"

render:
  formats:
    pdf: true
    html: true
    slides: false
    docx: false
    epub: false

llm:
  reviews:
    enabled: false
  translations:
    enabled: false

testing:
  max_test_failures: 0
  max_infra_test_failures: 0
  max_project_test_failures: 0

# Model parameters mirrored from models/alphafund_ewm.md (## ModelParameters).
# Read by z_generate_manuscript_variables.py for cross-checking.
model:
  num_channel_factors: 5
  num_levels_per_factor: 2
  num_reward_levels: 3
  num_loss_levels: 3
  num_actions: 6
  planning_horizon: 12
  channels: ["I", "S", "U", "Theta", "Z"]
  epistemic_channels: ["S", "Z"]
  pragmatic_channels: ["I", "U"]
